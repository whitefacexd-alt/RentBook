<!DOCTYPE html>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>RentBook</title>

<link rel="icon" href="favicon.ico"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #000000;
    --bg1:      #0a0a0a;
    --bg2:      #111111;
    --bg3:      #1a1a1a;
    --bg4:      #222222;
    --border:   #2a2a2a;
    --border2:  #333333;
    --text:     #ffffff;
    --text2:    #aaaaaa;
    --text3:    #666666;
    --paid:     #22c55e;
    --partial:  #f59e0b;
    --pending:  #ef4444;
    --advance:  #8b5cf6;
    --accent:   #ffffff;
    --r:        14px;
    --r2:       10px;
  }
  :root.light {
    --bg:       #ffffff;
    --bg1:      #f5f5f5;
    --bg2:      #eeeeee;
    --bg3:      #e8e8e8;
    --bg4:      #e0e0e0;
    --border:   #d5d5d5;
    --border2:  #cccccc;
    --text:     #000000;
    --text2:    #555555;
    --text3:    #999999;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  input, button, select { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  * { -webkit-tap-highlight-color: transparent; }

  /* Splash */
  #splash {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.5s ease;
  }
  #splash img { width: 120px; height: 120px; object-fit: contain; animation: splashPop 0.6s ease; }
  #splash .sname { margin-top: 20px; font-size: 28px; font-weight: 800; letter-spacing: 2px; color: #fff; }
  #splash .stag  { margin-top: 6px; font-size: 11px; font-weight: 400; letter-spacing: 4px; color: #555; text-transform: uppercase; }
  @keyframes splashPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .splash-out { opacity: 0; pointer-events: none; }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease forwards; }

  /* Status colors */
  .s-paid    { color: var(--paid) !important; }
  .s-partial { color: var(--partial) !important; }
  .s-pending { color: var(--pending) !important; }
  .s-advance { color: var(--advance) !important; }
  .bg-paid    { background: rgba(34,197,94,0.12) !important; }
  .bg-partial { background: rgba(245,158,11,0.12) !important; }
  .bg-pending { background: rgba(239,68,68,0.12) !important; }
  .bg-advance { background: rgba(139,92,246,0.12) !important; }
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="icon-512.png" alt="RentBook" onerror="this.style.display='none'"/>
  <div class="sname">RENTBOOK</div>
  <div class="stag">Rent · Track · Manage</div>
</div>

<div id="root"></div>

<script>
  // Hide splash after 1.8s
  setTimeout(() => {
    const s = document.getElementById('splash');
    if(s){ s.classList.add('splash-out'); setTimeout(()=>s.remove(), 500); }
  }, 1800);
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ─── Constants ───────────────────────────────────────────────────────────[...]
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const SC = { Paid:"#22c55e", Partial:"#f59e0b", Pending:"#ef4444", Advance:"#8b5cf6" };
const AVATAR_COLORS = ["#2a2a2a","#1e1e2e","#1a2a1a","#2a1a1a","#1a1a2e","#2a2a1a","#1e2a2a"];
const today = new Date();
const fmtD  = d => { const x=new Date(d); return `${x.getDate()} ${MONTHS[x.getMonth()]} ${x.getFullYear()}`; };
const mkKey = (y,m) => `${y}-${String(m+1).padStart(2,"0")}`;
const aColor = id => AVATAR_COLORS[id % AVATAR_COLORS.length];

// ─── Status logic ──────────────────────────────────────────────────────────[...]
function deriveStatus(paid, payable) {
  const p = Number(paid), t = Number(payable);
  if (p <= 0)   return { status:"Pending",  baki:t,     advance:0 };
  if (p < t)    return { status:"Partial",  baki:t-p,   advance:0 };
  if (p === t)  return { status:"Paid",     baki:0,     advance:0 };
  return               { status:"Advance",  baki:0,     advance:p-t };
}

// ─── Store ────────────────────────────────────────────────────────────[...]
let _tenants = [
  {id:1,name:"Rahul Sharma",room:"101",rent:8000,phone:"9876543210",joinDate:"2024-01-01",baseReading:0},
  {id:2,name:"Priya Singh", room:"102",rent:7500,phone:"9812345678",joinDate:"2024-03-01",baseReading:0},
  {id:3,name:"Amit Kumar",  room:"201",rent:9000,phone:"9900112233",joinDate:"2023-11-01",baseReading:0},
];
let _records  = {};
let _settings = { rate: 8 };
let _nextId   = 4;

const getRec  = (tid,yk) => _records[`${tid}_${yk}`] || null;
const saveRec = r        => { _records[`${r.tenantId}_${r.monthKey}`] = r; };

function buildRec(tenant, yk, prevReading, carryFwd) {
  const total = tenant.rent + carryFwd;
  return {
    tenantId:tenant.id, monthKey:yk, rent:tenant.rent,
    elecPrevReading:prevReading, elecCurrReading:prevReading,
    elecUnits:0, elecBill:0,
    totalPayable:total, amountPaid:0,
    status:"Pending", baki:total, advance:0, carryFwd,
    paymentDates:[],
  };
}

function recalc(r) {
  r.totalPayable = r.rent + r.elecBill + r.carryFwd;
  const d = deriveStatus(r.amountPaid, r.totalPayable);
  r.status=d.status; r.baki=d.baki; r.advance=d.advance;
  return r;
}

function ensureRec(tenantId, yk) {
  if (getRec(tenantId,yk)) return getRec(tenantId,yk);
  const tenant = _tenants.find(t=>t.id===tenantId);
  if (!tenant) return null;
  const [y,mo] = yk.split("-").map(Number);
  const pd = new Date(y,mo-2,1);
  const prev = getRec(tenantId, mkKey(pd.getFullYear(),pd.getMonth()));
  const prevReading = prev ? prev.elecCurrReading : (tenant.baseReading||0);
  let carryFwd = 0;
  if (prev) {
    if (prev.status==="Advance") carryFwd = -prev.advance;
    else if (prev.baki>0)        carryFwd = prev.baki;
  }
  const r = buildRec(tenant, yk, prevReading, carryFwd);
  saveRec(r);
  return r;
}

// ─── Icons (inline SVG components) ───────────────────────────────────────────
const Icon = {
  Home:    ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  Users:   ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Card:    ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
  History: ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  Settings:()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-17.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24"/></svg>,
  Plus:    ()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Edit:    ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  Trash:   ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
  Bolt:    ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  WA:      ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.297-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.501-.67-.51-.173-.009-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.626.712.228 1.36.196 1.871.119.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.006a6.506 6.506 0 1 0 6.512 6.506A6.516 6.516 0 0 0 12.05 6.979"/></svg>,
  Check:   ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  ChevL:   ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
  ChevR:   ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
  Sun:     ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
  Moon:    ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
};

// ─── App ─────────────────────────────────────────────────────────────[...]
function App() {
  const [tenants,  setTenants]  = useState([..._tenants]);
  const [settings, setSettings] = useState({..._settings});
  const [tab,      setTab]      = useState("dashboard");
  const [vm,       setVm]       = useState({y:today.getFullYear(), m:today.getMonth()});
  const [modal,    setModal]    = useState(null);
  const [toast,    setToast]    = useState(null);
  const [tick,     setTick]     = useState(0);
  const refresh = () => setTick(n=>n+1);

  const showToast = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null),2500); };

  useEffect(() => {
    _tenants.forEach(t => ensureRec(t.id, mkKey(vm.y,vm.m)));
    refresh();
  }, [vm, tenants]);

  const yk  = mkKey(vm.y, vm.m);
  const recs = useMemo(() => _tenants.map(t => getRec(t.id,yk)||ensureRec(t.id,yk)), [tick,vm,tenants]);

  const doPayment = (tid,amount,yk) => {
    const r=getRec(tid,yk)||ensureRec(tid,yk);
    r.amountPaid=Number(amount); recalc(r);
    r.paymentDates=[...r.paymentDates,{date:new Date().toISOString(),amount:Number(amount)}];
    saveRec(r); refresh(); showToast(`Saved · ${r.status}`);
  };
  const doElec = (tid,curr,yk) => {
    const r=getRec(tid,yk)||ensureRec(tid,yk);
    const units=Math.max(0,Number(curr)-r.elecPrevReading);
    r.elecCurrReading=Number(curr); r.elecUnits=units; r.elecBill=units*_settings.rate;
    recalc(r); saveRec(r); refresh(); showToast("Electricity updated");
  };
  const doAdd = d => {
    const t={id:_nextId++,...d,rent:Number(d.rent),baseReading:Number(d.baseReading||0)};
    _tenants=[..._tenants,t]; setTenants([..._tenants]); showToast("Tenant added");
  };
  const doEdit = (id,d) => {
    _tenants=_tenants.map(t=>t.id===id?{...t,...d,rent:Number(d.rent),baseReading:Number(d.baseReading||0)}:t);
    Object.values(_records).forEach(r=>{if(r.tenantId===id){r.rent=Number(d.rent);recalc(r);}});
    setTenants([..._tenants]); showToast("Updated");
  };
  const doDel = id => { _tenants=_tenants.filter(t=>t.id!==id); setTenants([..._tenants]); showToast("Removed",false); };
  const doSettings = s => { _settings=s; setSettings({...s}); showToast("Saved"); };

  const prevM = ()=>setVm(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1});
  const nextM = ()=>setVm(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1});

  const stats = useMemo(()=>({
    payable:   recs.reduce((s,r)=>s+(r?.totalPayable||0),0),
    collected: recs.reduce((s,r)=>s+Math.min(r?.amountPaid||0,r?.totalPayable||0),0),
    pending:   recs.reduce((s,r)=>s+(r?.baki||0),0),
    advance:   recs.reduce((s,r)=>s+(r?.advance||0),0),
  }),[tick,recs]);

  const TABS = [
    {id:"dashboard",icon:<Icon.Home/>,   lbl:"Home"},
    {id:"tenants",  icon:<Icon.Users/>,  lbl:"Tenants"},
    {id:"payments", icon:<Icon.Card/>,   lbl:"Pay"},
    {id:"history",  icon:<Icon.History/>,lbl:"History"},
    {id:"settings", icon:<Icon.Settings/>,lbl:"More"},
  ];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"var(--bg)",overflow:"hidden"}}>
      {/* Header */}
      <header style={H.header}>
        <div style={H.brand}>
          <img src="icon-192.png" style={{width:28,height:28,objectFit:"contain"}} alt="" onerror="this.style.display='none'"/>
          <span style={H.brandName}>RENTBOOK</span>
        </div>
        {["dashboard","payments","history"].includes(tab) && (
          <div style={H.monthRow}>
            <button style={H.mBtn} onClick={prevM}><Icon.ChevL/></button>
            <span style={H.mLabel}>{MONTHS[vm.m]} {vm.y}</span>
            <button style={H.mBtn} onClick={nextM}><Icon.ChevR/></button>
          </div>
        )}
      </header>

      {/* Content */}
      <main style={{flex:1,overflowY:"auto",padding:"0 0 80px"}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"16px 14px"}}>
          {tab==="dashboard" && <Dashboard tenants={tenants} recs={recs} stats={stats} vm={vm}/>}
          {tab==="tenants"   && <Tenants   tenants={tenants} onAdd={()=>setModal({t:"add"})} onEdit={t=>setModal({t:"edit",data:t})} onDel={doDel}/>}
          {tab==="payments"  && <Payments  tenants={tenants} recs={recs} yk={yk} settings={settings} vm={vm} onPayment={doPayment} onElec={doElec}/>}
          {tab==="history"   && <History   tenants={tenants} vm={vm}/>}
          {tab==="settings"  && <Settings  settings={settings} onSave={doSettings}/>}
        </div>
      </main>

      {/* Bottom Nav */}
      <nav style={H.bottomNav}>
        {TABS.map(t=>(
          <button key={t.id} style={{...H.navItem,...(tab===t.id?H.navActive:{})}} onClick={()=>setTab(t.id)}>
            {t.icon}
            <span style={H.navLbl}>{t.lbl}</span>
          </button>
        ))}
      </nav>

      {/* Modals */}
      {modal?.t==="add"  && <TenantModal mode="add"  onClose={()=>setModal(null)} onSave={d=>{doAdd(d);setModal(null);}}/>}
      {modal?.t==="edit" && <TenantModal mode="edit" existing={modal.data} onClose={()=>setModal(null)} onSave={d=>{doEdit(modal.data.id,d);setModal(null);}}/>}

      {/* Toast */}
      {toast && (
        <div style={{...H.toast,background:toast.ok?"#22c55e":"#ef4444"}}>
          <Icon.Check/> {toast.msg}
        </div>
      )}
    </div>
  );
}

// ─── Dashboard ───────────────────────────────────────────────────────────[...]
function Dashboard({tenants,recs,stats,vm}){
  const pct = stats.payable>0 ? Math.round((stats.collected/stats.payable)*100) : 0;
  return (
    <div className="fade-up">
      {/* Stats grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <StatBox label="Expected"  val={`₹${stats.payable.toLocaleString()}`}   color="#fff"       sub="This month"/>
        <StatBox label="Collected" val={`₹${stats.collected.toLocaleString()}`} color={SC.Paid}    sub={`${pct}% done`}/>
        <StatBox label="Pending"   val={`₹${stats.pending.toLocaleString()}`}   color={SC.Pending} sub="Due"/>
        <StatBox label="Advance"   val={`₹${stats.advance.toLocaleString()}`}   color={SC.Advance} sub="Carry next"/>
      </div>

      {/* Progress */}
      <div style={C.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12,fontWeight:600,color:"#666",letterSpacing:1,textTransform:"uppercase"}}>Collection</span>
          <span style={{fontSize:14,fontWeight:700,color:pct===100?SC.Paid:"#fff"}}>{pct}%</span>
        </div>
        <div style={{background:"var(--bg3)",borderRadius:99,height:5,overflow:"hidden"}}>
          <div style={{background:pct===100?"#22c55e":"#fff",height:"100%",width:`${pct}%`,borderRadius:99,transition:"width 0.6s ease"}}/>
        </div>
      </div>

      {/* Tenant list */}
      <div style={{fontSize:11,fontWeight:600,letterSpacing:1.5,color:"var(--text3)",textTransform:"uppercase",marginBottom:10}}>
        Tenants — {MONTHS[vm.m]}
      </div>
      {tenants.map((t,i)=>{
        const r=recs[i]; if(!r) return null;
        const sc = r.status.toLowerCase();
        return (
          <div key={t.id} style={{...C.card,marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
            <div style={{...C.av,background:aColor(t.id)}}>{t.name[0]}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:14,color:"var(--text)"}}>{t.name}</div>
              <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>Room {t.room}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:20,background:`${SC[r.status]}18`,color:SC[r.status]}}>{r.status}</div>
              <div style={{fontSize:11,color:"var(--text2)",marginTop:4}}>
                ₹{r.amountPaid.toLocaleString()} / ₹{r.totalPayable.toLocaleString()}
              </div>
              {r.baki>0 && <div style={{fontSize:10,color:SC.Pending,marginTop:2}}>₹{r.baki.toLocaleString()} baki</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function StatBox({label,val,color,sub}){
  return (
    <div style={{...C.card,padding:"14px 14px"}}>
      <div style={{fontSize:10,fontWeight:600,letterSpacing:1.5,color:"var(--text3)",textTransform:"uppercase",marginBottom:8}}>{label}</div>
      <div style={{fontSize:20,fontWeight:800,color,lineHeight:1}}>{val}</div>
      <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>{sub}</div>
    </div>
  );
}

// ─── Tenants ───────────────────────────────────────────────────────────[...]
function Tenants({tenants,onAdd,onEdit,onDel}){
  return (
    <div className="fade-up">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={C.pageTitle}>Tenants <span style={{color:"var(--text2)",fontWeight:400}}>({tenants.length})</span></div>
        <button style={C.addBtn} onClick={onAdd}><Icon.Plus/> Add</button>
      </div>
      {tenants.length===0 && <Empty msg="No tenants yet. Tap Add to get started."/>}
      {tenants.map(t=>(
        <div key={t.id} style={{...C.card,marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
          <div style={{...C.av,background:aColor(t.id)}}>{t.name[0]}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:14,color:"var(--text)"}}>{t.name}</div>
            <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>Room {t.room} · ₹{Number(t.rent).toLocaleString()}/mo</div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>📞 {t.phone}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <Btn2 onClick={()=>onEdit(t)}  color="var(--text)"    bg="var(--bg3)"><Icon.Edit/></Btn2>
            <Btn2 onClick={()=>{if(window.confirm(`Delete ${t.name}?`))onDel(t.id);}} color={SC.Pending} bg="#1e0a0a"><Icon.Trash/></Btn2>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Payments ───────────────────────────────────────────────────────────[...]
function Payments({tenants,recs,yk,settings,vm,onPayment,onElec}){
  const [active,  setActive]  = useState(null);
  const [payVal,  setPayVal]  = useState("");
  const [elecVal, setElecVal] = useState("");

  const tenant  = tenants.find(t=>t.id===active);
  const rec     = recs.find(r=>r?.tenantId===active);
  const mLabel  = `${MONTHS[vm.m]} ${vm.y}`;

  const sendWA = () => {
    if(!tenant||!rec) return;
    const phone = "91"+tenant.phone.replace(/\D/g,"").slice(-10);
    const msg = rec.status==="Pending"
      ? `Namaskar ${tenant.name} ji 🙏\n\n${mLabel} ka kiraya pending hai.\n\n💰 Total: ₹${rec.totalPayable.toLocaleString()}\n\nKripya jald payment karein.\nDhanyawad 🙏`
      : `Namaskar ${tenant.name} ji 🙏\n\n${mLabel} ka kiraya aadha baki hai.\n\n✅ Diya: ₹${rec.amountPaid.toLocaleString()}\n⏳ Baki: ₹${rec.baki.toLocaleString()}\n💰 Total: ₹${rec.totalPayable.toLocaleString()}\n\nKripya jald payment karein.\nDhanyawad 🙏`;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");
  };

  return (
    <div className="fade-up">
      {/* Tenant chips */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:16,scrollbarWidth:"none"}}>
        {tenants.map(t=>{
          const r = recs.find(r=>r?.tenantId===t.id);
          const on = active===t.id;
          return (
            <button key={t.id} onClick={()=>{setActive(t.id);setPayVal("");setElecVal("");}}
              style={{flexShrink:0,background:on?"var(--text)":"var(--bg2)",border:`1px solid ${on?"var(--text)":"var(--border)"}`,borderRadius:12,padding:"8px 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,textAlign:"center"}}>
              <div style={{...C.av,...C.avSm,background:on?"var(--bg)":aColor(t.id),color:on?"var(--text)":"#fff"}}>{t.name[0]}</div>
              <div style={{fontSize:11,fontWeight:600,color:on?"var(--bg)":"var(--text2)"}}>{t.name.split(" ")[0]}</div>
              {r && <div style={{width:6,height:6,borderRadius:99,background:SC[r.status]}}/>}
            </button>
          );
        })}
      </div>

      {!active && <Empty msg="Select a tenant above to record payment"/>}

      {tenant && rec && (
        <div>
          {/* Bill summary */}
          <div style={C.card}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:1.5,color:"var(--text3)",textTransform:"uppercase",marginBottom:12}}>
              Bill Summary · {mLabel}
            </div>
            <BillRow label="Base Rent"                                   val={`₹${rec.rent.toLocaleString()}`}/>
            <BillRow label={`Electricity · ${rec.elecUnits} units × ₹${settings.rate}`} val={`₹${rec.elecBill.toLocaleString()}`}/>
            {rec.carryFwd>0 && <BillRow label="Carry Forward (due)"      val={`+₹${rec.carryFwd.toLocaleString()}`} color={SC.Pending}/>}
            {rec.carryFwd<0 && <BillRow label="Advance Credit"            val={`-₹${Math.abs(rec.carryFwd).toLocaleString()}`} color={SC.Paid}/>}
            <div style={{border:"none",borderTop:"1px solid var(--bg3)",margin:"10px 0"}}/>
            <BillRow label="Total Payable" val={`₹${rec.totalPayable.toLocaleString()}`} bold/>
            <BillRow label="Paid"          val={`₹${rec.amountPaid.toLocaleString()}`}   color={SC[rec.status]} bold/>

            {/* Status chips */}
            <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{...C.pill,background:`${SC[rec.status]}18`,color:SC[rec.status],fontSize:12,fontWeight:700,padding:"5px 14px"}}>
                {rec.status}
              </span>
              {rec.baki>0    && <span style={{...C.pill,background:"#1a0a0a",color:SC.Pending,fontSize:12}}>⏳ ₹{rec.baki.toLocaleString()} baki</span>}
              {rec.advance>0 && <span style={{...C.pill,background:"#0d0a1a",color:SC.Advance,fontSize:12}}>🔄 ₹{rec.advance.toLocaleString()} advance</span>}
            </div>
            {rec.advance>0 && <div style={{marginTop:10,fontSize:12,color:"var(--text2)",textAlign:"center"}}>Next month mein ₹{rec.advance.toLocaleString()} auto-adjust hoga</div>}
          </div>

          {/* Electricity */}
          <div style={C.card}>
            <SectionHead icon={<Icon.Bolt/>} title="Electricity Reading"/>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{flex:1,background:"var(--bg1)",borderRadius:10,padding:"10px 12px",textAlign:"center",border:"1px solid var(--bg3)"}}>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,letterSpacing:1}}>PREVIOUS</div>
                <div style={{fontSize:20,fontWeight:700,color:"var(--text)"}}>{rec.elecPrevReading}</div>
              </div>
              <div style={{color:"var(--text2)",fontSize:16}}>→</div>
              <div style={{flex:1.4}}>
                <Input type="number" placeholder="Current reading" value={elecVal} onChange={e=>setElecVal(e.target.value)}/>
              </div>
            </div>
            {elecVal && Number(elecVal)>=rec.elecPrevReading && (
              <div style={{...C.infoBox,marginBottom:10}}>
                {Number(elecVal)-rec.elecPrevReading} units × ₹{settings.rate} = <b>₹{(Number(elecVal)-rec.elecPrevReading)*settings.rate}</b>
              </div>
            )}
            {elecVal && Number(elecVal)<rec.elecPrevReading && (
              <div style={{...C.infoBox,background:"#1a0a0a",color:SC.Pending,marginBottom:10}}>
                ⚠️ Current reading previous se kam nahi ho sakta
              </div>
            )}
            <PrimaryBtn onClick={()=>{if(!elecVal||Number(elecVal)<rec.elecPrevReading)return;onElec(tenant.id,elecVal,yk);setElecVal("");}}>
              Update Electricity
            </PrimaryBtn>
          </div>

          {/* Payment */}
          <div style={C.card}>
            <SectionHead icon={<Icon.Card/>} title="Record Payment"/>
            <Input type="number" placeholder={`Amount paid · Total ₹${rec.totalPayable}`} value={payVal} onChange={e=>setPayVal(e.target.value)}/>
            {payVal && (() => {
              const d = deriveStatus(Number(payVal), rec.totalPayable);
              return (
                <div style={{...C.infoBox,marginTop:8,color:SC[d.status]}}>
                  Status → <b>{d.status}</b>
                  {d.status==="Partial" && <span style={{color:"var(--text2)"}}> · ₹{d.baki.toLocaleString()} baki rahega</span>}
                  {d.status==="Advance" && <span style={{color:"var(--text2)"}}> · ₹{d.advance.toLocaleString()} advance</span>}
                  {d.status==="Pending" && <span style={{color:"var(--text2)"}}> · Poora ₹${rec.totalPayable.toLocaleString()} baki</span>}
                </div>
              );
            })()}
            <PrimaryBtn style={{marginTop:10,background:"#22c55e",color:"#000"}}
              onClick={()=>{if(!payVal)return;onPayment(tenant.id,payVal,yk);setPayVal("");}}>
              Save Payment
            </PrimaryBtn>
          </div>

          {/* WhatsApp */}
          {(rec.status==="Pending"||rec.status==="Partial") && tenant.phone && (
            <button onClick={sendWA} style={{width:"100%",background:"#075e54",border:"none",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:12,cursor:"pointer"}}>
              <div style={{color:"#25d366",flexShrink:0}}><Icon.WA/></div>
              <div style={{flex:1,textAlign:"left"}}>
                <div style={{fontWeight:700,fontSize:14,color:"#fff"}}>Send WhatsApp Reminder</div>
                <div style={{fontSize:11,color:"#25d366",marginTop:2}}>
                  {rec.status==="Pending" ? `₹${rec.totalPayable.toLocaleString()} pending` : `₹${rec.baki.toLocaleString()} baki`} · {tenant.name}
                </div>
              </div>
              <span style={{color:"#25d366",fontSize:16}}>→</span>
            </button>
          )}

          {/* Payment log */}
          {rec.paymentDates.length>0 && (
            <div style={C.card}>
              <SectionHead icon={<Icon.History/>} title="This Month Payments"/>
              {rec.paymentDates.map((p,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--bg2)",fontSize:13}}>
                  <span style={{color:"var(--text2)"}}>{fmtD(p.date)}</span>
                  <span style={{color:SC.Paid,fontWeight:600}}>₹{p.amount.toLocaleString()}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── History ───────────────────────────────────────────────────────────[...]
function History({tenants,vm}){
  const [filter,setFilter] = useState("all");
  let {y,m} = vm;
  const months = [];
  for(let i=0;i<6;i++){
    months.push(mkKey(y,m));
    if(m===0){y--;m=11;}else m--;
  }
  const list = filter==="all" ? tenants : tenants.filter(t=>t.id===Number(filter));
  return (
    <div className="fade-up">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={C.pageTitle}>History</div>
        <select style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"6px 10px",color:"var(--text)",fontSize:12}} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">All Tenants</option>
          {tenants.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
      </div>
      {list.map(t=>(
        <div key={t.id} style={{...C.card,marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{...C.av,background:aColor(t.id)}}>{t.name[0]}</div>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:"var(--text)"}}>{t.name}</div>
              <div style={{fontSize:12,color:"var(--text2)"}}>Room {t.room}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1.2fr",fontSize:10,fontWeight:700,letterSpacing:1,color:"var(--text3)",textTransform:"uppercase",marginBottom:8,paddingBottom:8,borderBottom:"1px solid var(--bg2)"}}>
            <span>Month</span><span>Payable</span><span>Paid</span><span>Status</span>
          </div>
          {months.map(mk=>{
            const r=getRec(t.id,mk);
            const [yr,mo]=mk.split("-");
            const lbl=`${MONTHS[parseInt(mo)-1]} ${yr}`;
            if(!r) return <div key={mk} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1.2fr",padding:"5px 0",fontSize:12,color:"var(--text3)",borderBottom:"1px solid var(--bg2)"}}>
              <span>{lbl}</span><span>—</span><span>—</span><span>—</span></div>;
            return <div key={mk} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1.2fr",padding:"5px 0",fontSize:12,borderBottom:"1px solid var(--bg2)"}}>
              <span style={{color:"var(--text2)"}}>{lbl}</span>
              <span>₹{r.totalPayable.toLocaleString()}</span>
              <span>₹{r.amountPaid.toLocaleString()}</span>
              <span style={{color:SC[r.status],fontWeight:700}}>{r.status}</span>
            </div>;
          })}
        </div>
      ))}
    </div>
  );
}

// ─── Settings ───────────────────────────────────────────────────────────[...]
function Settings({settings,onSave}){
  const [rate,setRate] = useState(settings.rate);
  
  const toggleTheme = () => {
    document.body.classList.toggle('light');
  };

  return (
    <div className="fade-up">
      <div style={{...C.pageTitle,marginBottom:16}}>Settings</div>
      
      {/* Dark/Light Mode Toggle */}
      <div style={C.card}>
        <SectionHead icon={<Icon.Sun/>} title="Theme"/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span style={{fontSize:12,color:"var(--text2)"}}>Dark / Light Mode</span>
          <button onClick={toggleTheme} style={{background:"var(--text)",border:"none",borderRadius:20,width:50,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"flex-end",padding:"2px 4px",position:"relative",transition:"all 0.3s ease"}}>
            <div style={{width:22,height:22,borderRadius:"50%",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.3s ease"}}>
              {document.body.classList.contains('light') ? <Icon.Sun/> : <Icon.Moon/>}
            </div>
          </button>
        </div>
      </div>

      <div style={C.card}>
        <SectionHead icon={<Icon.Bolt/>} title="Electricity Rate"/>
        <div style={{fontSize:12,color:"var(--text2)",marginBottom:10}}>Current: ₹{settings.rate} per unit</div>
        <Input type="number" value={rate} onChange={e=>setRate(e.target.value)} placeholder="Rate per unit"/>
        <PrimaryBtn style={{marginTop:10}} onClick={()=>onSave({rate:Number(rate)})}>Save Settings</PrimaryBtn>
      </div>
      
      <div style={C.card}>
        <SectionHead icon={<Icon.Check/>} title="How It Works"/>
        {["Partial pay → baki amount clearly dikhega","Extra diya → Advance (rent mein nahi jayega)","Advance → next month auto credit","Pending → next month carry forward","Electricity: curr - prev = units used"].map((x,i)=>(
          <div key={i} style={{fontSize:12,color:"var(--text2)",padding:"5px 0",borderBottom:"1px solid var(--bg2)",display:"flex",gap:8,alignItems:"flex-start"}}>
            <span style={{color:SC.Paid,flexShrink:0,marginTop:1}}><Icon.Check/></span>{x}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Tenant Modal ──────────────────────────────────────────────────────────[...]
function TenantModal({mode,existing,onClose,onSave}){
  const isEdit = mode==="edit";
  const [form,setForm] = useState(existing
    ? {name:existing.name,room:existing.room,rent:existing.rent,phone:existing.phone,joinDate:existing.joinDate,baseReading:existing.baseReading||0}
    : {name:"",room:"",rent:"",phone:"",joinDate:new Date().toISOString().split("T")[0],baseReading:0}
  );
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const fields = [
    {k:"name",       lbl:"Full Name",            ph:"Tenant name",       type:"text"},
    {k:"room",       lbl:"Room Number",           ph:"e.g. 101",          type:"text"},
    {k:"rent",       lbl:"Monthly Rent (₹)",      ph:"e.g. 8000",         type:"number"},
    {k:"phone",      lbl:"Phone (WhatsApp)",       ph:"10-digit number",   type:"tel"},
    {k:"joinDate",   lbl:"Join Date",              ph:"",                  type:"date"},
    {k:"baseReading",lbl:"Meter Reading at Join",  ph:"e.g. 1250 (meter reading jab tenant aaya)",type:"number"},
  ];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontWeight:700,fontSize:16,color:"var(--text)"}}>{isEdit?"Edit Tenant":"New Tenant"}</div>
          <button style={{background:"var(--bg3)",border:"none",color:"var(--text2)",width:30,height:30,borderRadius:8,cursor:"pointer",fontSize:16}} onClick={onClose}>✕</button>
        </div>
        {!isEdit && (
          <div style={{...C.infoBox,marginBottom:16}}>
            💡 Meter Reading at Join = jab tenant aaya tab meter pe jo reading thi. Yeh first month ki "Previous Reading" banega.
          </div>
        )}
        {fields.map(f=>(
          <div key={f.k} style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:6,letterSpacing:0.5}}>{f.lbl.toUpperCase()}</div>
            <Input type={f.type} placeholder={f.ph} value={form[f.k]} onChange={e=>set(f.k,e.target.value)}/>
          </div>
        ))}
        <PrimaryBtn style={{marginTop:8}} onClick={()=>{
          if(!form.name||!form.room||!form.rent) return alert("Name, Room aur Rent zaroori hai!");
          onSave({...form});
        }}>{isEdit?"Update Tenant":"Add Tenant"}</PrimaryBtn>
      </div>
    </div>
  );
}

// ─── Small components ────────────────────────────────────────────────────────[...]
const Input = ({style,...p}) => <input style={{background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:10,padding:"11px 13px",color:"var(--text)",fontSize:14,width:"100%",outline:"none",...style}} {...p}/>;
const PrimaryBtn = ({style,children,...p}) => <button style={{background:"var(--text)",border:"none",color:"var(--bg)",padding:"12px",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:14,width:"100%",...style}} {...p}>{children}</button>;
const Btn2 = ({onClick,color,bg,children}) => <button onClick={onClick} style={{background:bg,border:"none",color,width:32,height:32,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</button>;
const BillRow = ({label,val,color,bold}) => <div style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",fontWeight:bold?700:400}}>
  <span style={{color:"var(--text2)"}}>{label}</span><span style={{color:color||"var(--text)"}}>{val}</span></div>;
const SectionHead = ({icon,title}) => <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,fontSize:12,fontWeight:600,letterSpacing:1,color:"var(--text3)",textTransform:"uppercase"}}>
  <span style={{color:"var(--text2)"}}>{icon}</span>{title}</div>;
const Empty = ({msg}) => <div style={{textAlign:"center",padding:"48px 20px",color:"var(--text3)",fontSize:14}}>{msg}</div>;

// ─── Styles ──────────────────────────────────────────────────────────[...]
const H = {
  header:    {background:"var(--bg)",borderBottom:"1px solid var(--border)",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50},
  brand:     {display:"flex",alignItems:"center",gap:10},
  brandName: {fontWeight:900,fontSize:15,letterSpacing:3,color:"var(--text)"},
  monthRow:  {display:"flex",alignItems:"center",gap:12},
  mBtn:      {background:"var(--bg2)",border:"1px solid var(--border)",color:"var(--text)",width:30,height:30,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},
  mLabel:    {fontWeight:700,fontSize:13,minWidth:90,textAlign:"center",color:"var(--text)"},
  bottomNav: {position:"fixed",bottom:0,left:0,right:0,background:"var(--bg)",borderTop:"1px solid var(--border)",display:"flex",padding:"8px 0 calc(8px + env(safe-area-inset-bottom))",zIndex:50},
  navItem:   {flex:1,background:"none",border:"none",color:"var(--text3)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0",fontSize:13},
  navActive: {color:"var(--text)"},
  navLbl:    {fontSize:9,fontWeight:600,letterSpacing:0.5,textTransform:"uppercase"},
  toast:     {position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",color:"#000",fontWeight:700,fontSize:13,padding:"10px 20px",borderRadius:20,zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,0.3)"},
};
const C = {
  card:      {background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:14,padding:"14px",marginBottom:10},
  av:        {width:40,height:40,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,color:"#fff",flexShrink:0},
  avSm:      {width:30,height:30,fontSize:12,borderRadius:8},
  pill:      {display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600},
  pageTitle: {fontWeight:800,fontSize:18,color:"var(--text)"},
  addBtn:    {background:"var(--text)",border:"none",color:"var(--bg)",padding:"8px 14px",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6},
  infoBox:   {background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"var(--text2)",lineHeight:1.6},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
