<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>

<title>RentBook Pro</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0e0e14;font-family:'Outfit','Segoe UI',sans-serif;color:#e8e8f0;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;height:4px;}

::-webkit-scrollbar-thumb{background:#3a3a4e;border-radius:4px;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ─── Constants ───────────────────────────────────────────────────────────────
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const COLORS  = ["#7b68ee","#00c896","#f5a623","#ff5e5e","#4ecdc4","#45b7d1","#96ceb4"];
const STATUS_COLOR = {Paid:"#00c896",Partial:"#f5a623",Pending:"#ff5e5e",Advance:"#7b68ee"};

const today   = new Date();
const fmtDate = d => { const x=new Date(d); return `${x.getDate()} ${MONTHS[x.getMonth()]} ${x.getFullYear()}`; };
const mkKey   = (y,m) => `${y}-${String(m+1).padStart(2,"0")}`;
const ac      = id => COLORS[id % COLORS.length];

// ─── Status logic (FIXED) ────────────────────────────────────────────────────
// paid    = amount tenant actually gave this month
// payable = rent + elec + carryFwd
// status:
//   paid == 0              → Pending
//   0 < paid < payable     → Partial  (baki = payable - paid)
//   paid == payable        → Paid
//   paid > payable         → Advance  (advance = paid - payable)  ← NOT added to rent
function deriveStatus(paid, payable) {
  if (paid <= 0)         return { status:"Pending",  baki: payable,         advance: 0 };
  if (paid < payable)    return { status:"Partial",  baki: payable - paid,  advance: 0 };
  if (paid === payable)  return { status:"Paid",      baki: 0,               advance: 0 };
  /* paid > payable */   return { status:"Advance",  baki: 0,               advance: paid - payable };
}

// ─── In-memory store ─────────────────────────────────────────────────────────
let _tenants = [
  {id:1,name:"Rahul Sharma",room:"101",rent:8000,phone:"9876543210",joinDate:"2024-01-01",baseReading:0},
  {id:2,name:"Priya Singh", room:"102",rent:7500,phone:"9812345678",joinDate:"2024-03-01",baseReading:0},
  {id:3,name:"Amit Kumar",  room:"201",rent:9000,phone:"9900112233",joinDate:"2023-11-01",baseReading:0},
];
let _records = {};   // key: `${tenantId}_${yk}`
let _settings = {rate:8};
let _nextId   = 4;

const getRec  = (tid,yk) => _records[`${tid}_${yk}`] || null;
const saveRec = rec      => { _records[`${rec.tenantId}_${rec.monthKey}`] = rec; };

function buildRec(tenant, yk, prevReading, carryFwd) {
  return {
    tenantId:       tenant.id,
    monthKey:       yk,
    rent:           tenant.rent,
    elecPrevReading: prevReading,
    elecCurrReading: prevReading,
    elecUnits:      0,
    elecBill:       0,
    // totalPayable = rent + elecBill + carryFwd  (advance is NOT added here)
    totalPayable:   tenant.rent + carryFwd,
    amountPaid:     0,
    status:         "Pending",
    baki:           tenant.rent + carryFwd,
    advance:        0,
    carryFwd:       carryFwd,   // positive = due from tenant, negative = advance credit
    paymentDates:   [],
  };
}

function ensureRec(tenantId, yk) {
  if (getRec(tenantId, yk)) return getRec(tenantId, yk);
  const tenant = _tenants.find(t => t.id === tenantId);
  if (!tenant) return null;

  const [y,mo] = yk.split("-").map(Number);
  const prevDate = new Date(y, mo-2, 1);
  const prevYk   = mkKey(prevDate.getFullYear(), prevDate.getMonth());
  const prev     = getRec(tenantId, prevYk);

  // Previous meter reading: use prev month's currReading, else tenant's baseReading
  const prevReading = prev ? prev.elecCurrReading : (tenant.baseReading || 0);

  // Carry forward: positive = tenant owes, negative = advance credit to tenant
  let carryFwd = 0;
  if (prev) {
    if (prev.status === "Advance")        carryFwd = -prev.advance;       // credit
    else if (prev.baki > 0)              carryFwd = prev.baki;            // due
  }

  const rec = buildRec(tenant, yk, prevReading, carryFwd);
  saveRec(rec);
  return rec;
}

// Recalculate totalPayable & status after any change
function recalc(rec) {
  rec.totalPayable = rec.rent + rec.elecBill + rec.carryFwd;
  const d = deriveStatus(rec.amountPaid, rec.totalPayable);
  rec.status  = d.status;
  rec.baki    = d.baki;
  rec.advance = d.advance;
  return rec;
}

// ─── App ─────────────────────────────────────────────────────────────────────
export default function App() {
  const [tenants,   setTenants]   = useState([..._tenants]);
  const [settings,  setSettings]  = useState({..._settings});
  const [tab,       setTab]       = useState("dashboard");
  const [viewMonth, setViewMonth] = useState({y:today.getFullYear(), m:today.getMonth()});
  const [modal,     setModal]     = useState(null);
  const [toast,     setToast]     = useState(null);
  const [, forceUpdate]           = useState(0);
  const refresh = () => forceUpdate(n => n+1);

  const showToast = (msg, type="ok") => {
    setToast({msg,type});
    setTimeout(() => setToast(null), 2500);
  };

  // Ensure records exist for current view month
  useEffect(() => {
    _tenants.forEach(t => ensureRec(t.id, mkKey(viewMonth.y, viewMonth.m)));
    refresh();
  }, [viewMonth, tenants]);

  const yk      = mkKey(viewMonth.y, viewMonth.m);
  const records = _tenants.map(t => getRec(t.id,yk) || ensureRec(t.id,yk));

  // ── Handlers ──
  const doPayment = (tenantId, amount, yk) => {
    const rec = getRec(tenantId,yk) || ensureRec(tenantId,yk);
    rec.amountPaid = Number(amount);
    recalc(rec);
    rec.paymentDates = [...rec.paymentDates, {date:new Date().toISOString(), amount:Number(amount)}];
    saveRec(rec);
    refresh();
    showToast(`Payment saved! Status: ${rec.status}`);
  };

  const doElec = (tenantId, currReading, yk) => {
    const rec   = getRec(tenantId,yk) || ensureRec(tenantId,yk);
    const curr  = Number(currReading);
    const units = Math.max(0, curr - rec.elecPrevReading);
    rec.elecCurrReading = curr;
    rec.elecUnits       = units;
    rec.elecBill        = units * _settings.rate;
    recalc(rec);
    saveRec(rec);
    refresh();
    showToast("Electricity updated!");
  };

  const doAddTenant = data => {
    const t = {id:_nextId++, ...data, baseReading: Number(data.baseReading||0)};
    _tenants = [..._tenants, t];
    setTenants([..._tenants]);
    showToast("Tenant added! ✅");
  };

  const doEditTenant = (id, data) => {
    _tenants = _tenants.map(t => t.id===id ? {...t,...data, rent:Number(data.rent), baseReading:Number(data.baseReading||0)} : t);
    // update rent in existing records
    Object.values(_records).forEach(r => {
      if (r.tenantId === id) { r.rent = Number(data.rent); recalc(r); }
    });
    setTenants([..._tenants]);
    showToast("Tenant updated! ✅");
  };

  const doDeleteTenant = id => {
    _tenants = _tenants.filter(t => t.id !== id);
    setTenants([..._tenants]);
    showToast("Tenant removed", "err");
  };

  const doSaveSettings = s => {
    _settings = {...s};
    setSettings({..._settings});
    showToast("Settings saved!");
  };

  const prevMonth = () => setViewMonth(({y,m}) => m===0 ? {y:y-1,m:11} : {y,m:m-1});
  const nextMonth = () => setViewMonth(({y,m}) => m===11 ? {y:y+1,m:0} : {y,m:m+1});

  const totalPayable   = records.reduce((s,r)=>s+(r?.totalPayable||0),0);
  const totalCollected = records.reduce((s,r)=>s+Math.min(r?.amountPaid||0, r?.totalPayable||0),0);
  const totalPending   = records.reduce((s,r)=>s+(r?.baki||0),0);
  const totalAdvance   = records.reduce((s,r)=>s+(r?.advance||0),0);

  return (
    <div style={S.app}>
      {/* Header */}
      <header style={S.header}>
        <div style={S.logo}>
          <span style={{fontSize:22}}>🏠</span>
          <span style={S.logoTxt}>RentBook</span>
          <span style={S.logoBadge}>Pro</span>
        </div>
        <nav style={S.nav}>
          {[{id:"dashboard",icon:"📊",lbl:"Home"},{id:"tenants",icon:"👥",lbl:"Tenants"},
            {id:"payments",icon:"💳",lbl:"Pay"},{id:"history",icon:"📋",lbl:"History"},
            {id:"settings",icon:"⚙️",lbl:"Settings"}].map(t=>(
            <button key={t.id} style={{...S.navBtn,...(tab===t.id?S.navOn:{})}} onClick={()=>setTab(t.id)}>
              <span>{t.icon}</span><span style={S.navLbl}>{t.lbl}</span>
            </button>
          ))}
        </nav>
      </header>

      {/* Month bar */}
      {["dashboard","payments","history"].includes(tab) && (
        <div style={S.mbar}>
          <button style={S.mBtn} onClick={prevMonth}>‹</button>
          <span style={S.mTitle}>{MONTHS[viewMonth.m]} {viewMonth.y}</span>
          <button style={S.mBtn} onClick={nextMonth}>›</button>
        </div>
      )}

      <main style={S.main}>
        {tab==="dashboard" && <Dashboard tenants={tenants} records={records} tp={totalPayable} tc={totalCollected} tpend={totalPending} tadv={totalAdvance}/>}
        {tab==="tenants"   && <Tenants tenants={tenants} onAdd={()=>setModal({t:"add"})} onEdit={t=>setModal({t:"edit",data:t})} onDelete={doDeleteTenant}/>}
        {tab==="payments"  && <Payments tenants={tenants} records={records} yk={yk} settings={settings} viewMonth={viewMonth} onPayment={doPayment} onElec={doElec}/>}
        {tab==="history"   && <History tenants={tenants} viewMonth={viewMonth}/>}
        {tab==="settings"  && <Settings settings={settings} onSave={doSaveSettings}/>}
      </main>

      {modal?.t==="add"  && <TenantModal mode="add" onClose={()=>setModal(null)} onSave={d=>{doAddTenant(d);setModal(null);}}/>}
      {modal?.t==="edit" && <TenantModal mode="edit" existing={modal.data} onClose={()=>setModal(null)} onSave={d=>{doEditTenant(modal.data.id,d);setModal(null);}}/>}

      {toast && <div style={{...S.toast,background:toast.type==="err"?"#ff5e5e":"#00c896"}}>{toast.msg}</div>}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({tenants,records,tp,tc,tpend,tadv}){
  const pct = tp>0 ? Math.round((tc/tp)*100) : 0;
  return (
    <div>
      <div style={S.grid2}>
        <Card label="Expected"  value={`₹${tp.toLocaleString()}`}    color="#7b68ee" icon="📈"/>
        <Card label="Collected" value={`₹${tc.toLocaleString()}`}    color="#00c896" icon="✅"/>
        <Card label="Pending"   value={`₹${tpend.toLocaleString()}`} color="#ff5e5e" icon="⏳"/>
        <Card label="Advance"   value={`₹${tadv.toLocaleString()}`}  color="#f5a623" icon="🔄"/>
      </div>
      <div style={S.box}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}>
          <span>Collection Progress</span>
          <span style={{fontWeight:700,color:"#00c896"}}>{pct}%</span>
        </div>
        <div style={S.pBar}><div style={{...S.pFill,width:`${pct}%`}}/></div>
      </div>
      <div style={S.secTitle}>Tenant Status</div>
      {tenants.map((t,i)=>{
        const r=records[i]; if(!r) return null;
        return (
          <div key={t.id} style={S.tCard}>
            <div style={S.tLeft}>
              <div style={{...S.avatar,background:ac(t.id)}}>{t.name[0]}</div>
              <div>
                <div style={S.tName}>{t.name}</div>
                <div style={S.tSub}>Room {t.room}</div>
              </div>
            </div>
            <div style={S.tRight}>
              <div style={{...S.badge,background:STATUS_COLOR[r.status]+"22",color:STATUS_COLOR[r.status]}}>{r.status}</div>
              <div style={S.tSub}>₹{r.amountPaid.toLocaleString()} / ₹{r.totalPayable.toLocaleString()}</div>
              {r.baki>0    && <div style={S.redTag}>Baki ₹{r.baki.toLocaleString()}</div>}
              {r.advance>0 && <div style={S.advTag}>+₹{r.advance.toLocaleString()} advance</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}
function Card({label,value,color,icon}){
  return <div style={{...S.statCard,borderTop:`3px solid ${color}`}}>
    <div style={{fontSize:20}}>{icon}</div>
    <div style={{fontWeight:800,fontSize:17,color}}>{value}</div>
    <div style={{fontSize:11,color:"#888"}}>{label}</div>
  </div>;
}

// ─── Tenants ──────────────────────────────────────────────────────────────────
function Tenants({tenants,onAdd,onEdit,onDelete}){
  return (
    <div>
      <div style={S.row}>
        <div style={S.secTitle}>All Tenants ({tenants.length})</div>
        <button style={S.addBtn} onClick={onAdd}>+ Add</button>
      </div>
      {tenants.length===0 && <div style={S.empty}>Koi tenant nahi. "+ Add" se add karo.</div>}
      {tenants.map(t=>(
        <div key={t.id} style={S.tCard}>
          <div style={S.tLeft}>
            <div style={{...S.avatar,background:ac(t.id)}}>{t.name[0]}</div>
            <div>
              <div style={S.tName}>{t.name}</div>
              <div style={S.tSub}>Room {t.room} · ₹{Number(t.rent).toLocaleString()}/mo</div>
              <div style={{fontSize:11,color:"#666",marginTop:2}}>📞 {t.phone}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button style={S.editBtn} onClick={()=>onEdit(t)}>✏️</button>
            <button style={S.delBtn}  onClick={()=>{if(window.confirm(`${t.name} delete karo?`)) onDelete(t.id);}}>🗑️</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Payments ─────────────────────────────────────────────────────────────────
function Payments({tenants,records,yk,settings,viewMonth,onPayment,onElec}){
  const [active,  setActive]   = useState(null);
  const [payVal,  setPayVal]   = useState("");
  const [elecVal, setElecVal]  = useState("");

  const tenant = tenants.find(t=>t.id===active);
  const rec    = records.find(r=>r?.tenantId===active);

  const monthLabel = MONTHS[viewMonth.m]+" "+viewMonth.y;

  // WhatsApp reminder
  const sendWA = () => {
    if(!tenant||!rec) return;
    const phone = "91"+tenant.phone.replace(/\D/g,"").slice(-10);
    let msg = "";
    if(rec.status==="Pending"){
      msg = `Namaskar ${tenant.name} ji 🙏\n\n${monthLabel} ka kiraya pending hai.\n\n💰 Total: ₹${rec.totalPayable.toLocaleString()}\n\nKripya jald payment kar dijiye.\nShukriya 🙏`;
    } else if(rec.status==="Partial"){
      msg = `Namaskar ${tenant.name} ji 🙏\n\n${monthLabel} ka kiraya aadha baki hai.\n\n✅ Diya: ₹${rec.amountPaid.toLocaleString()}\n⏳ Baki: ₹${rec.baki.toLocaleString()}\n💰 Total: ₹${rec.totalPayable.toLocaleString()}\n\nKripya baki payment kar dijiye.\nShukriya 🙏`;
    }
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,"_blank");
  };

  return (
    <div>
      {/* Tenant selector tabs */}
      <div style={S.tabs}>
        {tenants.map(t=>(
          <button key={t.id} style={{...S.tab,...(active===t.id?S.tabOn:{})}}
            onClick={()=>{setActive(t.id);setPayVal("");setElecVal("");}}>
            <div style={{...S.avatar,...S.avatarSm,background:ac(t.id)}}>{t.name[0]}</div>
            <div style={{fontSize:11}}>{t.name.split(" ")[0]}</div>
          </button>
        ))}
      </div>

      {!active && <div style={S.empty}>👆 Upar se tenant select karo</div>}

      {tenant && rec && (
        <div>
          {/* ── Summary card ── */}
          <div style={S.box}>
            <Row label="Base Rent" val={`₹${rec.rent.toLocaleString()}`}/>
            <Row label={`Electricity (${rec.elecUnits} units × ₹${settings.rate})`} val={`₹${rec.elecBill.toLocaleString()}`}/>
            {rec.carryFwd>0 && <Row label="Carry Forward (pichhla baki)" val={`+₹${rec.carryFwd.toLocaleString()}`} color="#ff5e5e"/>}
            {rec.carryFwd<0 && <Row label="Advance Credit (pichhle se)" val={`-₹${Math.abs(rec.carryFwd).toLocaleString()}`} color="#00c896"/>}
            <div style={S.divider}/>
            <Row label="Total Payable" val={`₹${rec.totalPayable.toLocaleString()}`} bold/>
            <Row label="Amount Paid"   val={`₹${rec.amountPaid.toLocaleString()}`}   color={STATUS_COLOR[rec.status]} bold/>

            {/* Status + baki/advance info */}
            <div style={{display:"flex",justifyContent:"center",marginTop:10,gap:10,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{...S.statusPill,background:STATUS_COLOR[rec.status]}}>{rec.status}</div>
              {rec.baki>0    && <div style={S.bakiPill}>⏳ Baki: ₹{rec.baki.toLocaleString()}</div>}
              {rec.advance>0 && <div style={S.advPill}>🔄 Advance: ₹{rec.advance.toLocaleString()}</div>}
            </div>
            {rec.advance>0 && <div style={S.infoNote}>Next month mein ₹{rec.advance.toLocaleString()} automatically adjust hoga</div>}
          </div>

          {/* ── Electricity ── */}
          <div style={S.box}>
            <div style={S.secLabel}>⚡ Electricity Reading</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={S.elecBox}>
                <div style={S.elecLbl}>Previous</div>
                <div style={S.elecNum}>{rec.elecPrevReading}</div>
              </div>
              <div style={{color:"#7b68ee",fontSize:20,fontWeight:700}}>→</div>
              <div style={{flex:1.5}}>
                <div style={S.elecLbl}>Current Reading</div>
                <input style={S.inp} type="number" placeholder="Meter reading dalo"
                  value={elecVal} onChange={e=>setElecVal(e.target.value)}/>
              </div>
            </div>
            {elecVal && Number(elecVal)>=rec.elecPrevReading && (
              <div style={S.preview}>
                {Number(elecVal)-rec.elecPrevReading} units × ₹{settings.rate} = ₹{(Number(elecVal)-rec.elecPrevReading)*settings.rate}
              </div>
            )}
            {elecVal && Number(elecVal)<rec.elecPrevReading && (
              <div style={{...S.preview,color:"#ff5e5e"}}>⚠️ Current reading previous se kam nahi ho sakta!</div>
            )}
            <button style={S.btn} onClick={()=>{
              if(!elecVal||Number(elecVal)<rec.elecPrevReading) return;
              onElec(tenant.id,elecVal,yk); setElecVal("");
            }}>Update Electricity</button>
          </div>

          {/* ── Payment ── */}
          <div style={S.box}>
            <div style={S.secLabel}>💳 Payment Record karo</div>
            <input style={S.inp} type="number"
              placeholder={`Kitne diye? (Total: ₹${rec.totalPayable})`}
              value={payVal} onChange={e=>setPayVal(e.target.value)}/>

            {/* Live preview of what status will be */}
            {payVal && (() => {
              const p   = Number(payVal);
              const tot = rec.totalPayable;
              const d   = deriveStatus(p, tot);
              return (
                <div style={{marginTop:8}}>
                  <div style={{...S.preview,color:STATUS_COLOR[d.status]}}>
                    → Status: <b>{d.status}</b>
                    {d.status==="Partial"  && `  |  Baki: ₹${d.baki.toLocaleString()}`}
                    {d.status==="Advance"  && `  |  Advance: ₹${d.advance.toLocaleString()}`}
                    {d.status==="Pending"  && `  |  Poora ₹${tot.toLocaleString()} baki`}
                  </div>
                </div>
              );
            })()}

            <button style={{...S.btn,background:"#00c896",marginTop:10}} onClick={()=>{
              if(!payVal) return;
              onPayment(tenant.id,payVal,yk); setPayVal("");
            }}>💾 Save Payment</button>
          </div>

          {/* ── WhatsApp Reminder ── */}
          {(rec.status==="Pending"||rec.status==="Partial") && tenant.phone && (
            <button onClick={sendWA} style={S.waBtn}>
              <span style={{fontSize:22}}>💬</span>
              <div style={{textAlign:"left"}}>
                <div style={{fontWeight:700,fontSize:14}}>WhatsApp Reminder Bhejo</div>
                <div style={{fontSize:11,opacity:0.85}}>
                  {rec.status==="Pending"
                    ? `Poora ₹${rec.totalPayable.toLocaleString()} pending`
                    : `₹${rec.baki.toLocaleString()} baki hai`}
                  {" · "}{tenant.name}
                </div>
              </div>
              <span style={{marginLeft:"auto",fontSize:18}}>→</span>
            </button>
          )}

          {/* ── This month payment log ── */}
          {rec.paymentDates.length>0 && (
            <div style={S.box}>
              <div style={S.secLabel}>📝 Is mahine ke payments</div>
              {rec.paymentDates.map((p,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #1e1e2e",fontSize:13}}>
                  <span style={{color:"#888"}}>{fmtDate(p.date)}</span>
                  <span style={{color:"#00c896",fontWeight:600}}>₹{p.amount.toLocaleString()}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Row({label,val,color,bold}){
  return <div style={{display:"flex",justifyContent:"space-between",fontSize:14,padding:"4px 0",fontWeight:bold?700:400}}>
    <span style={{color:"#aaa"}}>{label}</span>
    <span style={{color:color||"#e8e8f0"}}>{val}</span>
  </div>;
}

// ─── History ──────────────────────────────────────────────────────────────────
function History({tenants,viewMonth}){
  const [filter,setFilter] = useState("all");
  let {y,m} = viewMonth;
  const months = [];
  for(let i=0;i<6;i++){
    months.push(mkKey(y,m));
    if(m===0){y--;m=11;}else m--;
  }
  const list = filter==="all" ? tenants : tenants.filter(t=>t.id===Number(filter));
  return (
    <div>
      <div style={S.row}>
        <div style={S.secTitle}>History</div>
        <select style={S.sel} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">Sabhi</option>
          {tenants.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
      </div>
      {list.map(t=>(
        <div key={t.id} style={{...S.box,marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{...S.avatar,background:ac(t.id)}}>{t.name[0]}</div>
            <div>
              <div style={{fontWeight:700}}>{t.name}</div>
              <div style={S.tSub}>Room {t.room}</div>
            </div>
          </div>
          <div style={{fontSize:13}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",color:"#555",fontWeight:700,fontSize:11,marginBottom:6,paddingBottom:6,borderBottom:"1px solid #2a2a3e"}}>
              <span>Month</span><span>Payable</span><span>Paid</span><span>Status</span>
            </div>
            {months.map(mk=>{
              const r = getRec(t.id,mk);
              const [yr,mo] = mk.split("-");
              const lbl = MONTHS[parseInt(mo)-1]+" "+yr;
              if(!r) return <div key={mk} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"4px 0",borderBottom:"1px solid #1a1a2e",color:"#444"}}>
                <span>{lbl}</span><span>—</span><span>—</span><span>—</span></div>;
              return <div key={mk} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"4px 0",borderBottom:"1px solid #1a1a2e"}}>
                <span>{lbl}</span>
                <span>₹{r.totalPayable.toLocaleString()}</span>
                <span>₹{r.amountPaid.toLocaleString()}</span>
                <span style={{color:STATUS_COLOR[r.status],fontWeight:600}}>{r.status}</span>
              </div>;
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function Settings({settings,onSave}){
  const [rate,setRate] = useState(settings.rate);
  return (
    <div>
      <div style={S.secTitle}>Settings</div>
      <div style={S.box}>
        <div style={S.secLabel}>⚡ Electricity Rate (₹ per unit)</div>
        <input style={{...S.inp,marginTop:8}} type="number" value={rate} onChange={e=>setRate(e.target.value)}/>
        <div style={{fontSize:12,color:"#666",marginTop:6}}>Current: ₹{settings.rate}/unit</div>
        <button style={{...S.btn,marginTop:12}} onClick={()=>onSave({rate:Number(rate)})}>Save</button>
      </div>
      <div style={S.box}>
        <div style={S.secLabel}>ℹ️ How it works</div>
        <div style={{fontSize:13,color:"#666",lineHeight:2}}>
          <div>✅ Partial pay → baki clearly dikhega</div>
          <div>✅ Extra diya → Advance (rent mein nahi jayega)</div>
          <div>✅ Advance → next month mein auto credit</div>
          <div>✅ Pending → next month mein carry forward</div>
          <div>✅ Electricity: curr - prev = units used</div>
          <div>✅ WhatsApp reminder: Pending/Partial pe</div>
        </div>
      </div>
    </div>
  );
}

// ─── Tenant Modal ─────────────────────────────────────────────────────────────
function TenantModal({mode,existing,onClose,onSave}){
  const isEdit = mode==="edit";
  const [form,setForm] = useState(existing
    ? {name:existing.name,room:existing.room,rent:existing.rent,phone:existing.phone,joinDate:existing.joinDate,baseReading:existing.baseReading||0}
    : {name:"",room:"",rent:"",phone:"",joinDate:new Date().toISOString().split("T")[0],baseReading:0}
  );
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  return (
    <div style={S.overlay} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.modal}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontWeight:700,fontSize:16}}>{isEdit?"✏️ Edit Tenant":"➕ New Tenant"}</span>
          <button style={S.closeBtn} onClick={onClose}>✕</button>
        </div>
        {[
          {k:"name",      lbl:"👤 Full Name",            ph:"Tenant ka naam"},
          {k:"room",      lbl:"🚪 Room No.",              ph:"e.g. 101"},
          {k:"rent",      lbl:"💰 Monthly Rent (₹)",     ph:"e.g. 8000", type:"number"},
          {k:"phone",     lbl:"📞 Phone (WhatsApp)",      ph:"10-digit number"},
          {k:"joinDate",  lbl:"📅 Join Date",             type:"date"},
          {k:"baseReading",lbl:"⚡ Meter Reading at Join",ph:"e.g. 1250", type:"number"},
        ].map(f=>(
          <div key={f.k} style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#888",marginBottom:4}}>{f.lbl}</div>
            <input style={S.inp} type={f.type||"text"} placeholder={f.ph} value={form[f.k]} onChange={e=>set(f.k,e.target.value)}/>
          </div>
        ))}
        {!isEdit && <div style={{fontSize:12,color:"#7b68ee",background:"#7b68ee11",padding:"8px 10px",borderRadius:8,marginBottom:10}}>
          💡 Meter Reading at Join = jab tenant aaya tab meter pe jo number tha. Yahi pehle month ki "Previous Reading" banega.
        </div>}
        <button style={{...S.btn,marginTop:4}} onClick={()=>{
          if(!form.name||!form.room||!form.rent) return alert("Naam, Room aur Rent zaroori hai!");
          onSave({...form,rent:Number(form.rent),baseReading:Number(form.baseReading||0)});
        }}>{isEdit?"💾 Update":"✅ Add Tenant"}</button>
      </div>
    </div>
  );
}
